<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

<title>Rail — Your Closet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,420..640&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  html, body { height: 100%; background: #1B1E2E; overscroll-behavior: none; }
  #root { height: 100%; }
  ::-webkit-scrollbar { display: none; }
  button { font-family: inherit; }
  button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid #C8932C; outline-offset: 2px; }
  input::placeholder, textarea::placeholder { color: #6E6B5E; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes sheetUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes toastIn { from { transform: translate(-50%, 8px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
  @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;

// ── localStorage storage shim ──────────────────────────────────────────────
const storage = {
  get: async (key) => {
    try { const v = localStorage.getItem('rail:' + key); return v != null ? { value: v } : null; } catch { return null; }
  },
  set: async (key, value) => {
    try { localStorage.setItem('rail:' + key, value); return true; } catch { return null; }
  },
  delete: async (key) => {
    try { localStorage.removeItem('rail:' + key); return true; } catch { return null; }
  },
};

// ── Lucide icons (inline SVG) ─────────────────────────────────────────────
function Icon({ d, size = 24, strokeWidth = 2, color = 'currentColor', style }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" style={style}>
      {Array.isArray(d) ? d.map((p,i) => <path key={i} d={p}/>) : <path d={d}/>}
    </svg>
  );
}
const Plus = ({size,strokeWidth,color,style}) => <Icon size={size} strokeWidth={strokeWidth} color={color} style={style} d={["M12 5v14","M5 12h14"]} />;
const X = ({size,strokeWidth,color,style}) => <Icon size={size} strokeWidth={strokeWidth} color={color} style={style} d={["M18 6 6 18","M6 6l12 12"]} />;
const Trash2 = ({size,color,style}) => <Icon size={size} color={color} style={style} d={["M3 6h18","M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6","M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2","M10 11v6","M14 11v6"]} />;
const Shirt = ({size,strokeWidth,color,style}) => <Icon size={size} strokeWidth={strokeWidth} color={color} style={style} d="M20.38 3.46 16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z" />;
const Sparkles = ({size,strokeWidth,color,style}) => <Icon size={size} strokeWidth={strokeWidth} color={color} style={style} d={["M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z","M20 3v4","M22 5h-4","M4 17v2","M5 18H3"]} />;
const LayoutGrid = ({size,strokeWidth,color,style}) => <Icon size={size} strokeWidth={strokeWidth} color={color} style={style} d={["M3 3h7v7H3z","M14 3h7v7h-7z","M14 14h7v7h-7z","M3 14h7v7H3z"]} />;
const Check = ({size,strokeWidth,color,style}) => <Icon size={size} strokeWidth={strokeWidth} color={color} style={style} d="M20 6 9 17l-5-5" />;
const Pencil = ({size,color,style}) => <Icon size={size} color={color} style={style} d={["M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z","M15 5l4 4"]} />;
const Loader2 = ({size,color,style}) => <Icon size={size} color={color} style={style} d="M21 12a9 9 0 1 1-6.219-8.56" />;
const ImageOff = ({size,color,style}) => <Icon size={size} color={color} style={style} d={["M2 2l20 20","M10.41 10.41a2 2 0 1 0 2.83 2.83","M13.5 6.5a2 2 0 0 1 2 2","M4.47 4.47A10 10 0 0 0 14 20H4a2 2 0 0 1-2-2V6c0-.37.06-.72.17-1.05","M8 8H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 1.85-1.24","M20 8c0-4.4-3.6-8-8-8"]} />;

// ── categories & palette ───────────────────────────────────────────────────
const BUILTIN_CATEGORIES = [
  { id: 'outerwear', label: 'Outerwear', swatch: '#8B6F9E', multi: false },
  { id: 'tops',      label: 'Tops',      swatch: '#6F8FAF', multi: false },
  { id: 'dresses',   label: 'Dresses',   swatch: '#C17A56', multi: false },
  { id: 'bottoms',   label: 'Bottoms',   swatch: '#7A8C5C', multi: false },
  { id: 'shoes',     label: 'Shoes',     swatch: '#C9A634', multi: false },
  { id: 'accessories', label: 'Accessories', swatch: '#8FA08A', multi: true },
];
const CUSTOM_PALETTE = ['#A2715F','#5C8C99','#9E7BA8','#A0925C','#6F9E7E','#9E6F7B'];

// ── style tokens ───────────────────────────────────────────────────────────
const inputStyle = { width:'100%', padding:'11px 13px', borderRadius:10, border:'1px solid rgba(245,241,232,0.16)', background:'rgba(245,241,232,0.05)', color:'#F5F1E8', fontSize:14.5, outline:'none' };
const primaryBtnStyle = { width:'100%', padding:'14px 0', borderRadius:12, border:'none', background:'#C8932C', color:'#1B1E2E', fontSize:15, fontWeight:600, cursor:'pointer' };
const secondaryBtnStyle = { padding:'14px 0', borderRadius:12, border:'1.5px solid rgba(245,241,232,0.2)', background:'transparent', color:'#F5F1E8', fontSize:15, fontWeight:600, cursor:'pointer' };
const smallActionBtn = { padding:'0 16px', borderRadius:10, border:'none', background:'#C8932C', color:'#1B1E2E', fontSize:13.5, fontWeight:600, cursor:'pointer' };
const addSlotStyle = { display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', borderRadius:14, border:'1.5px dashed rgba(245,241,232,0.22)', background:'rgba(245,241,232,0.03)', color:'#8C8978', cursor:'pointer' };
const removeBtnStyle = { position:'absolute', top:-6, right:-6, width:22, height:22, borderRadius:'50%', background:'#A8472F', border:'2px solid #1B1E2E', display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'#F5F1E8' };

// ── helpers ────────────────────────────────────────────────────────────────
function genId() { return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,9); }

function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read that file.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load that image.'));
      img.onload = () => {
        const maxDim = 720;
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = String(reader.result);
    };
    reader.readAsDataURL(file);
  });
}

async function safeGet(key) {
  try { const r = await storage.get(key); return r ? r.value : null; } catch { return null; }
}

function getOutfitItemIds(selections) {
  const ids = [];
  Object.values(selections || {}).forEach(val => { if (Array.isArray(val)) ids.push(...val); else if (val) ids.push(val); });
  return ids;
}

// ── small shared components ────────────────────────────────────────────────
function GarmentImage({ src, alt }) {
  if (!src) return <div style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}}><ImageOff size={26} color="#B9B6AE"/></div>;
  return <img src={src} alt={alt} style={{width:'100%',height:'100%',objectFit:'contain',display:'block'}}/>;
}

function EmptyState({ icon, title, subtitle, action }) {
  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',textAlign:'center',padding:'64px 32px',gap:10}}>
      <div style={{color:'#C8932C',marginBottom:6}}>{icon}</div>
      <div style={{fontFamily:"'Fraunces', serif",fontSize:19,color:'#F5F1E8'}}>{title}</div>
      <div style={{fontSize:13.5,color:'#9C998C',lineHeight:1.5,maxWidth:260}}>{subtitle}</div>
      {action}
    </div>
  );
}

function Toast({ message }) {
  return (
    <div style={{position:'absolute',bottom:96,left:'50%',transform:'translateX(-50%)',background:'#F5F1E8',color:'#1B1E2E',padding:'10px 18px',borderRadius:30,fontSize:13,fontWeight:600,boxShadow:'0 8px 24px rgba(0,0,0,0.35)',zIndex:60,animation:'toastIn 0.25s ease-out',whiteSpace:'nowrap'}}>
      {message}
    </div>
  );
}

function SectionTag({ label, swatch, count }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:8,padding:'0 16px',marginBottom:10}}>
      <span style={{width:9,height:9,borderRadius:'50%',background:swatch,flexShrink:0,boxShadow:`0 0 0 3px ${swatch}22`}}/>
      <span style={{fontFamily:"'JetBrains Mono', monospace",fontSize:11,fontWeight:600,letterSpacing:'0.12em',textTransform:'uppercase',color:'#F5F1E8'}}>{label}</span>
      <span style={{flex:1,height:1,background:'rgba(245,241,232,0.14)'}}/>
      <span style={{fontFamily:"'JetBrains Mono', monospace",fontSize:11,color:'#8C8978'}}>{count}</span>
    </div>
  );
}

function SlotLabel({ category }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:8}}>
      <span style={{width:7,height:7,borderRadius:'50%',background:category.swatch}}/>
      <span style={{fontFamily:"'JetBrains Mono', monospace",fontSize:10.5,letterSpacing:'0.1em',textTransform:'uppercase',color:'#9C998C'}}>{category.label}</span>
    </div>
  );
}

function ItemCard({ item, onClick, size = 132 }) {
  return (
    <button onClick={onClick} style={{width:size,flexShrink:0,display:'flex',flexDirection:'column',gap:6,background:'transparent',border:'none',padding:0,cursor:'pointer',textAlign:'left'}}>
      <div style={{width:size,height:size,borderRadius:14,background:'#F5F1E8',overflow:'hidden',boxShadow:'0 4px 14px rgba(0,0,0,0.25)',padding:10}}>
        <GarmentImage src={item.image} alt={item.name}/>
      </div>
      <span style={{fontSize:12.5,color:'#EDEAE0',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</span>
    </button>
  );
}

function CategoryChip({ category, active, onClick }) {
  return (
    <button onClick={onClick} style={{display:'flex',alignItems:'center',gap:6,padding:'7px 13px',borderRadius:20,border:active?`1.5px solid ${category.swatch}`:'1.5px solid rgba(245,241,232,0.18)',background:active?`${category.swatch}26`:'transparent',color:'#F5F1E8',fontSize:13,fontWeight:500,whiteSpace:'nowrap',cursor:'pointer',flexShrink:0}}>
      <span style={{width:7,height:7,borderRadius:'50%',background:category.swatch}}/>{category.label}
    </button>
  );
}

function FieldLabel({ children }) {
  return <div style={{fontSize:11.5,fontWeight:600,letterSpacing:'0.04em',color:'#9C998C',marginBottom:6,textTransform:'uppercase'}}>{children}</div>;
}

function ConfirmDeleteButton({ onConfirm, label = 'Delete' }) {
  const [armed, setArmed] = useState(false);
  const timeoutRef = useRef(null);
  useEffect(() => () => { if (timeoutRef.current) clearTimeout(timeoutRef.current); }, []);
  function handleClick() {
    if (!armed) { setArmed(true); timeoutRef.current = setTimeout(() => setArmed(false), 2500); }
    else { clearTimeout(timeoutRef.current); setArmed(false); onConfirm(); }
  }
  return (
    <button onClick={handleClick} style={{width:'100%',padding:'13px 0',borderRadius:12,border:armed?'1.5px solid #A8472F':'1.5px solid rgba(168,71,47,0.4)',background:armed?'rgba(168,71,47,0.18)':'transparent',color:'#D98A73',fontSize:14,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:7}}>
      <Trash2 size={15}/>{armed ? 'Tap again to confirm' : label}
    </button>
  );
}

function ModalShell({ title, onClose, children, maxHeight = '88vh' }) {
  return (
    <div onClick={onClose} style={{position:'fixed',inset:0,background:'rgba(10,11,18,0.6)',display:'flex',alignItems:'flex-end',justifyContent:'center',zIndex:50}}>
      <div onClick={e => e.stopPropagation()} style={{width:'100%',maxWidth:480,maxHeight,background:'#22253A',borderRadius:'22px 22px 0 0',padding:'14px 20px 26px',overflowY:'auto',boxShadow:'0 -10px 40px rgba(0,0,0,0.4)',animation:'sheetUp 0.28s cubic-bezier(0.16,1,0.3,1)'}}>
        <div style={{width:38,height:4,borderRadius:4,background:'rgba(245,241,232,0.18)',margin:'0 auto 16px'}}/>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18}}>
          <span style={{fontFamily:"'Fraunces', serif",fontSize:19,color:'#F5F1E8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',paddingRight:10}}>{title}</span>
          <button onClick={onClose} aria-label="Close" style={{width:30,height:30,borderRadius:'50%',border:'none',background:'rgba(245,241,232,0.08)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',color:'#F5F1E8',flexShrink:0}}><X size={16}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ── API Key Modal ──────────────────────────────────────────────────────────
function ApiKeyModal({ onClose, onSave }) {
  const [key, setKey] = useState('');
  return (
    <ModalShell title="Anthropic API Key" onClose={onClose}>
      <div style={{fontSize:13.5,color:'#9C998C',lineHeight:1.6,marginBottom:16}}>
        The AI stylist needs your Anthropic API key to suggest outfits. Your key is stored only on this device in localStorage and never sent anywhere except Anthropic's API.
      </div>
      <div style={{marginBottom:18}}>
        <FieldLabel>API Key</FieldLabel>
        <input value={key} onChange={e => setKey(e.target.value)} placeholder="sk-ant-..." style={inputStyle} type="password"/>
      </div>
      <button onClick={() => { if (key.trim()) onSave(key.trim()); }} disabled={!key.trim()} style={{...primaryBtnStyle, opacity: key.trim() ? 1 : 0.45}}>Save key</button>
      <div style={{marginTop:12,textAlign:'center'}}>
        <a href="https://console.anthropic.com/keys" target="_blank" rel="noreferrer" style={{fontSize:12.5,color:'#C8932C',textDecoration:'none'}}>Get an API key →</a>
      </div>
    </ModalShell>
  );
}

// ── Layout ─────────────────────────────────────────────────────────────────
function Header({ activeTab, onAdd }) {
  return (
    <div style={{padding:'18px 18px 14px',display:'flex',alignItems:'center',justifyContent:'space-between',borderBottom:'1px solid rgba(245,241,232,0.08)',flexShrink:0}}>
      <div>
        <div style={{fontFamily:"'Fraunces', serif",fontSize:24,fontWeight:600,color:'#F5F1E8',letterSpacing:'0.01em'}}>Rail</div>
        <div style={{fontFamily:"'JetBrains Mono', monospace",fontSize:10.5,letterSpacing:'0.16em',textTransform:'uppercase',color:'#736F60',marginTop:1}}>Your closet</div>
      </div>
      {activeTab === 'closet' && (
        <button onClick={onAdd} aria-label="Add clothing item" style={{width:42,height:42,borderRadius:'50%',background:'#C8932C',border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 14px rgba(200,147,44,0.4)'}}>
          <Plus size={22} color="#1B1E2E" strokeWidth={2.5}/>
        </button>
      )}
    </div>
  );
}

function TabBar({ activeTab, setActiveTab }) {
  const tabs = [
    { id: 'closet', label: 'Closet', Icon: Shirt },
    { id: 'outfit', label: 'Outfit', Icon: Sparkles },
    { id: 'saved',  label: 'Saved',  Icon: LayoutGrid },
  ];
  return (
    <div style={{display:'flex',borderTop:'1px solid rgba(245,241,232,0.08)',background:'#1B1E2E',flexShrink:0,paddingBottom:'env(safe-area-inset-bottom)'}}>
      {tabs.map(({ id, label, Icon }) => {
        const active = activeTab === id;
        return (
          <button key={id} onClick={() => setActiveTab(id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'10px 0 12px',background:'none',border:'none',cursor:'pointer',color:active?'#C8932C':'#6E6B5E'}}>
            <Icon size={21} strokeWidth={active?2.3:1.8}/>
            <span style={{fontSize:11,fontWeight:active?600:500}}>{label}</span>

// ── Closet ─────────────────────────────────────────────────────────────────
function ClosetView({ items, categories, loading, onSelectItem }) {
  if (loading) return <div style={{display:'flex',justifyContent:'center',padding:'80px 0'}}><Loader2 size={26} color="#C8932C" style={{animation:'spin 1s linear infinite'}}/></div>;
  if (items.length === 0) return <EmptyState icon={<Shirt size={36}/>} title="Your closet is empty" subtitle="Tap the + above to add your first piece — a photo, a name, and a category is all it takes."/>;
  const populated = categories.filter(cat => items.some(i => i.categoryId === cat.id));
  return (
    <div style={{paddingTop:18,paddingBottom:8}}>
      {populated.map(cat => {
        const catItems = items.filter(i => i.categoryId === cat.id);
        return (
          <div key={cat.id} style={{marginBottom:22}}>
            <SectionTag label={cat.label} swatch={cat.swatch} count={catItems.length}/>
            <div style={{display:'flex',gap:12,overflowX:'auto',padding:'0 16px 4px'}}>
              {catItems.map(item => <ItemCard key={item.id} item={item} onClick={() => onSelectItem(item)}/>)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Add Item ───────────────────────────────────────────────────────────────
function AddItemModal({ categories, onClose, onSave, onAddCategory }) {
  const [name, setName] = useState('');
  const [categoryId, setCategoryId] = useState(null);
  const [notes, setNotes] = useState('');
  const [image, setImage] = useState(null);
  const [resizing, setResizing] = useState(false);
  const [error, setError] = useState('');
  const [addingCategory, setAddingCategory] = useState(false);
  const [newCatName, setNewCatName] = useState('');
  const [saving, setSaving] = useState(false);
  const fileInputRef = useRef(null);

  async function handleFile(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setResizing(true); setError('');
    try { setImage(await resizeImage(file)); } catch { setError("Couldn't process that image — try another photo."); } finally { setResizing(false); }
  }

  async function handleConfirmNewCategory() {
    const trimmed = newCatName.trim(); if (!trimmed) return;
    const cat = await onAddCategory(trimmed); setCategoryId(cat.id); setNewCatName(''); setAddingCategory(false);
  }

  function handleSave() {
    if (!image || !name.trim() || !categoryId || saving) return;
    setSaving(true); onSave({ name: name.trim(), categoryId, notes: notes.trim(), image });
  }

  const canSave = !!image && !!name.trim() && !!categoryId && !saving;

  return (
    <ModalShell title="Add a piece" onClose={onClose}>
      <div style={{marginBottom:18}}>
        <input ref={fileInputRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
        <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{width:'100%',height:200,borderRadius:16,border:'1.5px dashed rgba(245,241,232,0.28)',background:'rgba(245,241,232,0.04)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden',padding:0}}>
          {resizing ? <Loader2 size={26} color="#C8932C" style={{animation:'spin 1s linear infinite'}}/> : image ? <img src={image} alt="Preview" style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}/> : <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,color:'#9C998C'}}><Plus size={24}/><span style={{fontSize:13}}>Add a photo</span></div>}
        </button>
        {image && !resizing && <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={{marginTop:8,fontSize:12.5,color:'#C8932C',background:'none',border:'none',cursor:'pointer',padding:0}}>Choose a different photo</button>}
        {error && <div style={{color:'#E08A6F',fontSize:12.5,marginTop:6}}>{error}</div>}
      </div>
      <div style={{marginBottom:16}}>
        <FieldLabel>Name</FieldLabel>
        <input value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Navy bomber jacket" style={inputStyle}/>
      </div>
      <div style={{marginBottom:16}}>
        <FieldLabel>Category</FieldLabel>
        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
          {categories.map(cat => <CategoryChip key={cat.id} category={cat} active={categoryId === cat.id} onClick={() => setCategoryId(cat.id)}/>)}
          <button onClick={() => setAddingCategory(true)} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:20,border:'1.5px dashed rgba(245,241,232,0.3)',background:'transparent',color:'#C9C5B8',fontSize:13,whiteSpace:'nowrap',cursor:'pointer',flexShrink:0}}><Plus size={13}/> New</button>
        </div>
        {addingCategory && (
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <input autoFocus value={newCatName} onChange={e => setNewCatName(e.target.value)} placeholder="Category name" style={{...inputStyle,flex:1}} onKeyDown={e => e.key==='Enter' && handleConfirmNewCategory()}/>
            <button onClick={handleConfirmNewCategory} style={smallActionBtn}>Add</button>
          </div>
        )}
      </div>
      <div style={{marginBottom:18}}>
        <FieldLabel>Notes <span style={{color:'#6E6B5E',fontWeight:400,textTransform:'none'}}>(optional)</span></FieldLabel>
        <textarea value={notes} onChange={e => setNotes(e.target.value)} placeholder="Size, fabric, where it's from…" rows={2} style={{...inputStyle,resize:'none',fontFamily:'inherit'}}/>
      </div>
      <button onClick={handleSave} disabled={!canSave} style={{...primaryBtnStyle,opacity:canSave?1:0.45}}>{saving ? 'Saving…' : 'Add to closet'}</button>
    </ModalShell>
  );
}

// ── Item Detail ────────────────────────────────────────────────────────────
function ItemDetailModal({ item, category, outfitCount, onClose, onDelete }) {
  return (
    <ModalShell title={item.name} onClose={onClose}>
      <div style={{borderRadius:16,background:'#F5F1E8',padding:18,marginBottom:16,display:'flex',justifyContent:'center',height:240}}><GarmentImage src={item.image} alt={item.name}/></div>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:14,flexWrap:'wrap'}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:category?category.swatch:'#888'}}/>
        <span style={{fontSize:13,color:'#C9C5B8'}}>{category?category.label:'Uncategorized'}</span>
        <span style={{fontSize:13,color:'#6E6B5E'}}>·</span>
        <span style={{fontSize:13,color:'#6E6B5E'}}>worn in {outfitCount} outfit{outfitCount===1?'':'s'}</span>
      </div>
      {item.notes && <div style={{fontSize:13.5,color:'#C9C5B8',lineHeight:1.5,marginBottom:18,background:'rgba(245,241,232,0.04)',padding:'10px 13px',borderRadius:10}}>{item.notes}</div>}
      <ConfirmDeleteButton onConfirm={onDelete} label="Remove from closet"/>
    </ModalShell>
  );
}

// ── Picker ─────────────────────────────────────────────────────────────────
function PickerModal({ category, items, currentSelection, onPick, onToggle, onClose }) {
  const isMulti = category.multi;
  const selectedSet = isMulti ? new Set(currentSelection || []) : null;
  return (
    <ModalShell title={`Choose ${category.label.toLowerCase()}`} onClose={onClose}>
      {items.length === 0 ? (
        <EmptyState icon={<ImageOff size={30}/>} title="Nothing here yet" subtitle={`Add some ${category.label.toLowerCase()} from the Closet tab first.`}/>
      ) : (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {items.map(item => {
            const isSelected = isMulti ? selectedSet.has(item.id) : currentSelection === item.id;
            return (
              <button key={item.id} onClick={() => isMulti ? onToggle(item.id) : onPick(item.id)} style={{background:'#F5F1E8',borderRadius:14,padding:10,border:isSelected?'2.5px solid #C8932C':'2.5px solid transparent',cursor:'pointer',display:'flex',flexDirection:'column',gap:6,position:'relative'}}>
                {isSelected && <div style={{position:'absolute',top:6,right:6,width:20,height:20,borderRadius:'50%',background:'#C8932C',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2}}><Check size={12} color="#1B1E2E" strokeWidth={3}/></div>}
                <div style={{height:100,display:'flex',alignItems:'center',justifyContent:'center'}}><GarmentImage src={item.image} alt={item.name}/></div>
                <span style={{fontSize:12,color:'#1B1E2E',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</span>
              </button>
            );
          })}
        </div>
      )}
      {isMulti && items.length > 0 && <button onClick={onClose} style={{...primaryBtnStyle,marginTop:18}}>Done</button>}
    </ModalShell>
  );
}

// ── Outfit Builder ─────────────────────────────────────────────────────────
function slotHeight(catId) { if (catId==='shoes') return 108; if (catId==='outerwear') return 138; return 152; }

function OutfitBuilderView({ items, categories, selections, onOpenPicker, onRemoveSingle, onRemoveAccessory, onClearAll, onOpenSave, hasAnySelection, onSuggest, suggestLoading, suggestionNote }) {
  if (items.length === 0) return <EmptyState icon={<Sparkles size={34}/>} title="Nothing to work with yet" subtitle="Add a few pieces to your closet, then come back to put together an outfit."/>;
  return (
    <div style={{padding:'18px 16px 24px'}}>
      <div style={{marginBottom:20}}>
        <button onClick={onSuggest} disabled={suggestLoading} style={{width:'100%',padding:'14px 0',borderRadius:14,border:'1.5px solid rgba(200,147,44,0.45)',background:'rgba(200,147,44,0.12)',color:'#E0AC4A',fontSize:14.5,fontWeight:600,cursor:suggestLoading?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,opacity:suggestLoading?0.7:1}}>
          {suggestLoading ? <Loader2 size={17} style={{animation:'spin 1s linear infinite'}}/> : <Sparkles size={17}/>}
          {suggestLoading ? 'Finding your fit…' : 'Suggest an outfit'}
        </button>
        {suggestionNote && !suggestLoading && <div style={{fontSize:12.5,color:'#9C998C',fontStyle:'italic',marginTop:8,padding:'0 4px',lineHeight:1.4}}>"{suggestionNote}"</div>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:16,marginBottom:22}}>
        {categories.map(cat => {
          if (cat.multi) {
            const selectedIds = selections[cat.id] || [];
            const selectedItems = selectedIds.map(id => items.find(i => i.id === id)).filter(Boolean);
            return (
              <div key={cat.id}>
                <SlotLabel category={cat}/>
                <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:2}}>
                  {selectedItems.map(item => (
                    <div key={item.id} style={{position:'relative',width:78,flexShrink:0}}>
                      <div style={{width:78,height:78,borderRadius:12,background:'#F5F1E8',padding:8}}><GarmentImage src={item.image} alt={item.name}/></div>
                      <button onClick={() => onRemoveAccessory(cat.id, item.id)} style={removeBtnStyle}><X size={11}/></button>
                    </div>
                  ))}
                  <button onClick={() => onOpenPicker(cat)} style={{...addSlotStyle,width:78,height:78,flexShrink:0}}><Plus size={18}/></button>
                </div>
              </div>
            );
          }
          const height = slotHeight(cat.id);
          const selectedId = selections[cat.id];
          const selectedItem = selectedId ? items.find(i => i.id === selectedId) : null;
          return (
            <div key={cat.id}>
              <SlotLabel category={cat}/>
              {selectedItem ? (
                <div style={{position:'relative'}}>
                  <button onClick={() => onOpenPicker(cat)} style={{width:'100%',height,borderRadius:14,background:'#F5F1E8',padding:14,border:'none',cursor:'pointer'}}><GarmentImage src={selectedItem.image} alt={selectedItem.name}/></button>
                  <button onClick={() => onRemoveSingle(cat.id)} style={removeBtnStyle}><X size={11}/></button>
                </div>
              ) : (
                <button onClick={() => onOpenPicker(cat)} style={{...addSlotStyle,width:'100%',height}}>
                  <Plus size={18}/><span style={{fontSize:12,marginTop:4}}>Add {cat.label.toLowerCase()}</span>
                </button>
              )}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={onClearAll} disabled={!hasAnySelection} style={{...secondaryBtnStyle,flex:1,opacity:hasAnySelection?1:0.4}}>Clear</button>
        <button onClick={onOpenSave} disabled={!hasAnySelection} style={{...primaryBtnStyle,flex:2,opacity:hasAnySelection?1:0.4}}>Save outfit</button>
      </div>
    </div>
  );
}

// ── Save Outfit ────────────────────────────────────────────────────────────
function SaveOutfitModal({ onClose, onSave, defaultName, editing }) {
  const [name, setName] = useState(defaultName || '');
  const [saving, setSaving] = useState(false);
  function handleSave() { if (!name.trim() || saving) return; setSaving(true); onSave(name.trim()); }
  return (
    <ModalShell title={editing ? 'Update outfit' : 'Save this outfit'} onClose={onClose}>
      <div style={{marginBottom:18}}>
        <FieldLabel>Name</FieldLabel>
        <input autoFocus value={name} onChange={e => setName(e.target.value)} placeholder="e.g. Friday class fit" style={inputStyle} onKeyDown={e => e.key==='Enter' && handleSave()}/>
      </div>
      <button onClick={handleSave} disabled={!name.trim()||saving} style={{...primaryBtnStyle,opacity:name.trim()&&!saving?1:0.45}}>{saving?'Saving…':editing?'Update outfit':'Save outfit'}</button>
    </ModalShell>
  );
}

// ── Saved Outfits ──────────────────────────────────────────────────────────
function SavedOutfitsView({ outfits, items, onOpen }) {
  if (outfits.length === 0) return <EmptyState icon={<LayoutGrid size={32}/>} title="No saved outfits" subtitle="Put a few pieces together in the Outfit tab, then save your favorite combos here."/>;
  return (
    <div style={{padding:'18px 16px 24px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      {outfits.slice().reverse().map(outfit => {
        const allIds = getOutfitItemIds(outfit.selections);
        const thumbs = allIds.map(id => items.find(i => i.id === id)).filter(Boolean).slice(0,4);
        return (
          <button key={outfit.id} onClick={() => onOpen(outfit)} style={{background:'#22253A',borderRadius:16,padding:12,border:'1px solid rgba(245,241,232,0.06)',cursor:'pointer',textAlign:'left',display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,height:110}}>
              {thumbs.length > 0 ? thumbs.map(item => (
                <div key={item.id} style={{background:'#F5F1E8',borderRadius:8,padding:6,gridColumn:thumbs.length===1?'1 / -1':'auto'}}><GarmentImage src={item.image} alt={item.name}/></div>
              )) : (
                <div style={{gridColumn:'1 / -1',display:'flex',alignItems:'center',justifyContent:'center',color:'#6E6B5E'}}><ImageOff size={20}/></div>
              )}
            </div>
            <div style={{fontSize:13.5,fontWeight:600,color:'#F5F1E8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{outfit.name}</div>
            <div style={{fontSize:11.5,color:'#6E6B5E'}}>{allIds.length} piece{allIds.length===1?'':'s'}</div>
          </button>
        );
      })}
    </div>
  );
}

// ── Outfit Detail ──────────────────────────────────────────────────────────
function OutfitDetailModal({ outfit, items, categories, onClose, onDelete, onEdit }) {
  const catMap = useMemo(() => Object.fromEntries(categories.map(c => [c.id, c])), [categories]);
  const entries = Object.entries(outfit.selections || {}).filter(([,v]) => Array.isArray(v) ? v.length > 0 : !!v);
  return (
    <ModalShell title={outfit.name} onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:18}}>
        {entries.map(([catId, val]) => {
          const cat = catMap[catId] || { label:'Other', swatch:'#888' };
          const ids = Array.isArray(val) ? val : [val];
          const its = ids.map(id => items.find(i => i.id === id)).filter(Boolean);
          if (its.length === 0) return null;
          return (
            <div key={catId}>
              <SlotLabel category={cat}/>
              <div style={{display:'flex',gap:10,overflowX:'auto'}}>
                {its.map(item => (
                  <div key={item.id} style={{width:90,height:90,borderRadius:12,background:'#F5F1E8',padding:8,flexShrink:0}}><GarmentImage src={item.image} alt={item.name}/></div>
                ))}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={onEdit} style={{...secondaryBtnStyle,flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><Pencil size={14}/> Edit</button>
        <div style={{flex:1}}><ConfirmDeleteButton onConfirm={onDelete} label="Delete"/></div>
      </div>
    </ModalShell>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [items, setItems] = useState([]);
  const [customCategories, setCustomCategories] = useState([]);
  const [outfits, setOutfits] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeTab, setActiveTab] = useState('closet');
  const [addItemOpen, setAddItemOpen] = useState(false);
  const [detailItem, setDetailItem] = useState(null);
  const [pickerCategory, setPickerCategory] = useState(null);
  const [selections, setSelections] = useState({});
  const [saveOutfitOpen, setSaveOutfitOpen] = useState(false);
  const [detailOutfit, setDetailOutfit] = useState(null);
  const [editingOutfitId, setEditingOutfitId] = useState(null);
  const [toast, setToast] = useState(null);
  const [suggestLoading, setSuggestLoading] = useState(false);
  const [suggestionNote, setSuggestionNote] = useState('');
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('rail:apiKey') || '');
  const toastTimeoutRef = useRef(null);

  const allCategories = useMemo(() => [...BUILTIN_CATEGORIES, ...customCategories], [customCategories]);

  function showToast(msg) {
    setToast(msg);
    if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
    toastTimeoutRef.current = setTimeout(() => setToast(null), 2200);
  }

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const idsRaw = await safeGet('item-ids');
        const ids = idsRaw ? JSON.parse(idsRaw) : [];
        const loadedItems = (await Promise.all(ids.map(async id => { const r = await safeGet(`item:${id}`); return r ? JSON.parse(r) : null; }))).filter(Boolean);
        const ccRaw = await safeGet('custom-categories');
        const cc = ccRaw ? JSON.parse(ccRaw) : [];
        const oidsRaw = await safeGet('outfit-ids');
        const oids = oidsRaw ? JSON.parse(oidsRaw) : [];
        const loadedOutfits = (await Promise.all(oids.map(async id => { const r = await safeGet(`outfit:${id}`); return r ? JSON.parse(r) : null; }))).filter(Boolean);
        if (!cancelled) { setItems(loadedItems); setCustomCategories(cc); setOutfits(loadedOutfits); }
      } catch(e) { /* ignore */ } finally { if (!cancelled) setLoading(false); }
    })();
    return () => { cancelled = true; };
  }, []);

  async function persist(key, value) {
    try { await storage.set(key, value); } catch { showToast("Couldn't save — your changes may not persist."); }
  }

  async function handleAddItem({ name, categoryId, notes, image }) {
    const id = genId();
    const newItem = { id, name, categoryId, notes, image, dateAdded: new Date().toISOString() };
    const nextItems = [...items, newItem];
    setItems(nextItems); setAddItemOpen(false); showToast('Added to your closet');
    await persist(`item:${id}`, JSON.stringify(newItem));
    await persist('item-ids', JSON.stringify(nextItems.map(i => i.id)));
  }

  async function handleAddCategory(label) {
    const id = 'c-' + genId();
    const swatch = CUSTOM_PALETTE[customCategories.length % CUSTOM_PALETTE.length];
    const newCat = { id, label, swatch, multi: false };
    const next = [...customCategories, newCat];
    setCustomCategories(next);
    await persist('custom-categories', JSON.stringify(next));
    return newCat;
  }

  async function handleDeleteItem(id) {
    const next = items.filter(i => i.id !== id);
    setItems(next); setDetailItem(null); showToast('Removed from your closet');
    try { await storage.delete(`item:${id}`); } catch {}
    await persist('item-ids', JSON.stringify(next.map(i => i.id)));
  }

  const hasAnySelection = useMemo(() => getOutfitItemIds(selections).length > 0, [selections]);

  async function handleSuggestOutfit() {
    if (items.length === 0 || suggestLoading) return;
    if (!apiKey) { setShowApiKeyModal(true); return; }
    setSuggestLoading(true);
    try {
      const singleCats = allCategories.filter(c => !c.multi).map(c => c.id);
      const multiCats = allCategories.filter(c => c.multi).map(c => c.id);
      const manifest = allCategories.map(cat => {
        const catItems = items.filter(i => i.categoryId === cat.id);
        if (catItems.length === 0) return null;
        const lines = catItems.map(i => `  - ${i.id} :: ${i.name}${i.notes ? ' (' + i.notes + ')' : ''}`).join('\n');
        return `${cat.label} [category id: ${cat.id}]:\n${lines}`;
      }).filter(Boolean).join('\n\n');

      const prompt = `You are a men's fashion stylist assembling ONE outfit for a man in his 20s, using ONLY items from the wardrobe listed below. Never invent items that aren't listed.\n\nUse web search to check what's currently trending in men's fashion right now — fits, silhouettes, color and pattern pairings, layering — then build the most stylish, cohesive combination achievable from this exact wardrobe. Prioritize current, of-the-moment menswear over generic basics.\n\nWARDROBE:\n${manifest}\n\nFill a selection for each category id below where the wardrobe has something reasonable. Single-select categories take one item id (string) or null. Multi-select categories take an array of item ids (use [] if nothing fits).\nSingle-select category ids: ${singleCats.join(', ') || 'none'}\nMulti-select category ids: ${multiCats.join(', ') || 'none'}\n\nRespond with ONLY one JSON object and nothing else — no markdown fences, no explanation outside the JSON. Exact shape:\n{"selections": {"<categoryId>": "<itemId, null, or array for multi>"}, "reason": "<one short sentence, under 18 words, on why this combo works right now>"}`;

      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
        body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: prompt }] }),
      });
      const data = await response.json();
      if (data.error) throw new Error(data.error.message);
      const text = (data.content || []).map(b => b.type === 'text' ? b.text : '').filter(Boolean).join('\n');
      const cleaned = text.replace(/```json|```/g, '').trim();
      const jsonStart = cleaned.indexOf('{'), jsonEnd = cleaned.lastIndexOf('}');
      if (jsonStart === -1 || jsonEnd === -1) throw new Error('No JSON in response');
      const parsed = JSON.parse(cleaned.slice(jsonStart, jsonEnd + 1));
      const rawSelections = parsed.selections || {};
      const validated = {};
      allCategories.forEach(cat => {
        const val = rawSelections[cat.id];
        if (cat.multi) { const arr = Array.isArray(val) ? val : []; const validIds = arr.filter(id => items.some(i => i.id === id && i.categoryId === cat.id)); if (validIds.length > 0) validated[cat.id] = validIds; }
        else if (val && items.some(i => i.id === val && i.categoryId === cat.id)) validated[cat.id] = val;
      });
      if (Object.keys(validated).length === 0) showToast("Couldn't put together a fit from what you have yet.");
      else { setSelections(validated); setEditingOutfitId(null); setSuggestionNote(typeof parsed.reason === 'string' ? parsed.reason : ''); }
    } catch(e) {
      showToast("Couldn't reach the stylist — try again.");
    } finally { setSuggestLoading(false); }
  }

  async function handleSaveOutfit(name) {
    const id = editingOutfitId || genId();
    const newOutfit = { id, name, selections, dateCreated: new Date().toISOString() };
    let nextOutfits = editingOutfitId ? outfits.map(o => o.id === id ? newOutfit : o) : [...outfits, newOutfit];
    setOutfits(nextOutfits); setSaveOutfitOpen(false); setSelections({}); setEditingOutfitId(null);
    showToast(editingOutfitId ? 'Outfit updated' : 'Outfit saved');
    await persist(`outfit:${id}`, JSON.stringify(newOutfit));
    await persist('outfit-ids', JSON.stringify(nextOutfits.map(o => o.id)));
  }

  async function handleDeleteOutfit(id) {
    const next = outfits.filter(o => o.id !== id);
    setOutfits(next); setDetailOutfit(null); showToast('Outfit deleted');
    try { await storage.delete(`outfit:${id}`); } catch {}
    await persist('outfit-ids', JSON.stringify(next.map(o => o.id)));
  }

  function handleEditOutfit(outfit) { setSelections(outfit.selections || {}); setEditingOutfitId(outfit.id); setDetailOutfit(null); setActiveTab('outfit'); }

  const itemCategoryMap = useMemo(() => Object.fromEntries(allCategories.map(c => [c.id, c])), [allCategories]);
  function outfitCountForItem(itemId) { return outfits.filter(o => getOutfitItemIds(o.selections).includes(itemId)).length; }
  const editingOutfitName = editingOutfitId ? (outfits.find(o => o.id === editingOutfitId) || {}).name || '' : '';

  return (
    <div style={{position:'fixed',inset:0,background:'#1B1E2E',display:'flex',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:480,position:'relative',display:'flex',flexDirection:'column',fontFamily:"'Inter', sans-serif",color:'#F5F1E8'}}>
        <Header activeTab={activeTab} onAdd={() => setAddItemOpen(true)}/>
        <main style={{flex:1,overflowY:'auto'}}>
          {activeTab === 'closet' && <ClosetView items={items} categories={allCategories} loading={loading} onSelectItem={setDetailItem}/>}
          {activeTab === 'outfit' && !loading && <OutfitBuilderView items={items} categories={allCategories} selections={selections} onOpenPicker={setPickerCategory} onRemoveSingle={catId => setSelections(p => { const n={...p}; delete n[catId]; return n; })} onRemoveAccessory={(catId,itemId) => setSelections(p => ({...p,[catId]:(p[catId]||[]).filter(x=>x!==itemId)}))} onClearAll={() => { setSelections({}); setEditingOutfitId(null); setSuggestionNote(''); }} onOpenSave={() => setSaveOutfitOpen(true)} hasAnySelection={hasAnySelection} onSuggest={handleSuggestOutfit} suggestLoading={suggestLoading} suggestionNote={suggestionNote}/>}
          {activeTab === 'saved' && !loading && <SavedOutfitsView items={items} outfits={outfits} onOpen={setDetailOutfit}/>}
        </main>
        <TabBar activeTab={activeTab} setActiveTab={setActiveTab}/>

        {addItemOpen && <AddItemModal categories={allCategories} onClose={() => setAddItemOpen(false)} onSave={handleAddItem} onAddCategory={handleAddCategory}/>}
        {detailItem && <ItemDetailModal item={detailItem} category={itemCategoryMap[detailItem.categoryId]} outfitCount={outfitCountForItem(detailItem.id)} onClose={() => setDetailItem(null)} onDelete={() => handleDeleteItem(detailItem.id)}/>}
        {pickerCategory && <PickerModal category={pickerCategory} items={items.filter(i => i.categoryId === pickerCategory.id)} currentSelection={selections[pickerCategory.id]} onPick={itemId => { setSelections(p => ({...p,[pickerCategory.id]:itemId})); setPickerCategory(null); }} onToggle={itemId => setSelections(p => { const cur=p[pickerCategory.id]||[]; return {...p,[pickerCategory.id]:cur.includes(itemId)?cur.filter(x=>x!==itemId):[...cur,itemId]}; })} onClose={() => setPickerCategory(null)}/>}
        {saveOutfitOpen && <SaveOutfitModal onClose={() => setSaveOutfitOpen(false)} onSave={handleSaveOutfit} defaultName={editingOutfitName} editing={!!editingOutfitId}/>}
        {detailOutfit && <OutfitDetailModal outfit={detailOutfit} items={items} categories={allCategories} onClose={() => setDetailOutfit(null)} onDelete={() => handleDeleteOutfit(detailOutfit.id)} onEdit={() => handleEditOutfit(detailOutfit)}/>}
        {showApiKeyModal && <ApiKeyModal onClose={() => setShowApiKeyModal(false)} onSave={key => { setApiKey(key); localStorage.setItem('rail:apiKey', key); setShowApiKeyModal(false); showToast('API key saved'); }}/>}
        {toast && <Toast message={toast}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
