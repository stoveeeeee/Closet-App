async function dbLoadAll(userId) {
  const [itemsRes, outfitsRes, metaRes] = await Promise.all([
    sb.from('items').select('id, data').eq('user_id', userId),
    sb.from('outfits').select('id, data').eq('user_id', userId),
    sb.from('user_meta').select('custom_categories').eq('user_id', userId).maybeSingle(),
  ]);
  return {
    items: (itemsRes.data || []).map(r => r.data),
    outfits: (outfitsRes.data || []).map(r => r.data),
    customCategories: metaRes.data?.custom_categories || [],
  };
}
async function dbUpsertItem(userId, item) { await sb.from('items').upsert({ id: item.id, user_id: userId, data: item }); }

function resizeImage(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image.'));
      img.onload = () => {
        const maxDim = 720;
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height*maxDim/width); width = maxDim; }
          else { width = Math.round(width*maxDim/height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/png'));
      };
      img.src = String(reader.result);
    };
    reader.readAsDataURL(file);
  });
}

// ── Auth screens ───────────────────────────────────────────────────────────
function LoginScreen() {
  const [email, setEmail] = useState('');
  const [sent, setSent] = useState(false);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  async function handleSend() {
    const trimmed = email.trim();
    if (!trimmed) return;
    setLoading(true); setError('');
    const { error: err } = await sb.auth.signInWithOtp({
      email: trimmed,
      options: { emailRedirectTo: 'https://stoveeeeee.github.io/Closet-App/' }
    });
    setLoading(false);
    if (err) { setError(err.message); }
    else { setSent(true); }
  }

  if (sent) return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',padding:'0 36px',gap:16,textAlign:'center'}}>
      <div style={{width:64,height:64,borderRadius:'50%',background:'rgba(200,147,44,0.12)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:8}}>
        <Mail size={28} color="#C8932C"/>
      </div>
      <div style={{fontFamily:"'Fraunces',serif",fontSize:26,color:'#F5F1E8'}}>Check your email</div>
      <div style={{fontSize:14,color:'#9C998C',lineHeight:1.6}}>
        We sent a login link to <span style={{color:'#C9C5B8',fontWeight:500}}>{email.trim()}</span>. Tap it to open your closet — no password needed.
      </div>
      <button onClick={()=>setSent(false)} style={{marginTop:8,background:'none',border:'none',color:'#C8932C',fontSize:13.5,cursor:'pointer'}}>Use a different email</button>
    </div>
  );

  return (
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'100%',padding:'0 36px',gap:14}}>
      <div style={{fontFamily:"'Fraunces',serif",fontSize:36,color:'#F5F1E8',letterSpacing:'0.01em'}}>Rail</div>
      <div style={{fontFamily:"'JetBrains Mono',monospace",fontSize:11,letterSpacing:'0.16em',textTransform:'uppercase',color:'#736F60',marginBottom:20}}>Your closet</div>
      <div style={{width:'100%',maxWidth:320,display:'flex',flexDirection:'column',gap:12}}>
        <div style={{fontSize:14,color:'#9C998C',textAlign:'center',lineHeight:1.5}}>Enter your email to get a login link. Your closet syncs across all your devices.</div>
        <input
          value={email}
          onChange={e=>setEmail(e.target.value)}
          onKeyDown={e=>e.key==='Enter'&&handleSend()}
          placeholder="you@example.com"
          type="email"
          style={{...inputStyle,textAlign:'center'}}
          autoFocus
        />
        {error && <div style={{fontSize:12.5,color:'#E08A6F',textAlign:'center'}}>{error}</div>}
        <button onClick={handleSend} disabled={loading||!email.trim()} style={{...primaryBtnStyle,opacity:(!loading&&email.trim())?1:0.45,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          {loading ? <Loader2 size={17} style={{animation:'spin 1s linear infinite'}}/> : <Mail size={17}/>}
          {loading ? 'Sending…' : 'Send login link'}
        </button>
      </div>
    </div>
  );
}

function ClosetView({ items, categories, loading, onSelectItem }) {
  if (loading) return <div style={{display:'flex',justifyContent:'center',padding:'80px 0'}}><Loader2 size={26} color="#C8932C" style={{animation:'spin 1s linear infinite'}}/></div>;
  if (items.length===0) return <EmptyState icon={<Shirt size={36}/>} title="Your closet is empty" subtitle="Tap the + above to add your first piece."/>;
  const populated = categories.filter(cat=>items.some(i=>i.categoryId===cat.id));
  return (
    <div style={{paddingTop:18,paddingBottom:8}}>
      {populated.map(cat=>{
        const catItems=items.filter(i=>i.categoryId===cat.id);
        return (
          <div key={cat.id} style={{marginBottom:22}}>
            <SectionTag label={cat.label} swatch={cat.swatch} count={catItems.length}/>
            <div style={{display:'flex',gap:12,overflowX:'auto',padding:'0 16px 4px'}}>
              {catItems.map(item=><ItemCard key={item.id} item={item} onClick={()=>onSelectItem(item)}/>)}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ── Add Item ───────────────────────────────────────────────────────────────
function AddItemModal({ categories, onClose, onSave, onAddCategory }) {
  const [name,setName]=useState('');
  const [categoryId,setCategoryId]=useState(null);
  const [notes,setNotes]=useState('');
  const [image,setImage]=useState(null);
  const [resizing,setResizing]=useState(false);
  const [error,setError]=useState('');
  const [addingCat,setAddingCat]=useState(false);
  const [newCatName,setNewCatName]=useState('');
  const [saving,setSaving]=useState(false);
  const fileRef=useRef(null);

  async function handleFile(e) {
    const file=e.target.files?.[0]; if(!file)return;
    setResizing(true);setError('');
    try{setImage(await resizeImage(file));}catch{setError("Couldn't process that image.");}finally{setResizing(false);}
  }
  async function handleConfirmCat() {
    const t=newCatName.trim();if(!t)return;
    const cat=await onAddCategory(t);setCategoryId(cat.id);setNewCatName('');setAddingCat(false);
  }
  function handleSave(){if(!image||!name.trim()||!categoryId||saving)return;setSaving(true);onSave({name:name.trim(),categoryId,notes:notes.trim(),image});}
  const canSave=!!image&&!!name.trim()&&!!categoryId&&!saving;

  return (
    <ModalShell title="Add a piece" onClose={onClose}>
      <div style={{marginBottom:18}}>
        <input ref={fileRef} type="file" accept="image/*" onChange={handleFile} style={{display:'none'}}/>
        <button onClick={()=>fileRef.current?.click()} style={{width:'100%',height:200,borderRadius:16,border:'1.5px dashed rgba(245,241,232,0.28)',background:'rgba(245,241,232,0.04)',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',overflow:'hidden',padding:0}}>
          {resizing?<Loader2 size={26} color="#C8932C" style={{animation:'spin 1s linear infinite'}}/>:image?<img src={image} alt="Preview" style={{maxWidth:'100%',maxHeight:'100%',objectFit:'contain'}}/>:<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8,color:'#9C998C'}}><Plus size={24}/><span style={{fontSize:13}}>Add a photo</span></div>}
        </button>
        {image&&!resizing&&<button onClick={()=>fileRef.current?.click()} style={{marginTop:8,fontSize:12.5,color:'#C8932C',background:'none',border:'none',cursor:'pointer',padding:0}}>Choose a different photo</button>}
        {error&&<div style={{color:'#E08A6F',fontSize:12.5,marginTop:6}}>{error}</div>}
      </div>
      <div style={{marginBottom:16}}><FieldLabel>Name</FieldLabel><input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Navy bomber jacket" style={inputStyle}/></div>
      <div style={{marginBottom:16}}>
        <FieldLabel>Category</FieldLabel>
        <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
          {categories.map(cat=><CategoryChip key={cat.id} category={cat} active={categoryId===cat.id} onClick={()=>setCategoryId(cat.id)}/>)}
          <button onClick={()=>setAddingCat(true)} style={{display:'flex',alignItems:'center',gap:5,padding:'7px 13px',borderRadius:20,border:'1.5px dashed rgba(245,241,232,0.3)',background:'transparent',color:'#C9C5B8',fontSize:13,whiteSpace:'nowrap',cursor:'pointer',flexShrink:0}}><Plus size={13}/> New</button>
        </div>
        {addingCat&&(
          <div style={{display:'flex',gap:8,marginTop:10}}>
            <input autoFocus value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="Category name" style={{...inputStyle,flex:1}} onKeyDown={e=>e.key==='Enter'&&handleConfirmCat()}/>
            <button onClick={handleConfirmCat} style={smallActionBtn}>Add</button>
          </div>
        )}
      </div>
      <div style={{marginBottom:18}}>
        <FieldLabel>Notes <span style={{color:'#6E6B5E',fontWeight:400,textTransform:'none'}}>(optional)</span></FieldLabel>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Size, fabric, where it's from…" rows={2} style={{...inputStyle,resize:'none',fontFamily:'inherit'}}/>
      </div>
      <button onClick={handleSave} disabled={!canSave} style={{...primaryBtnStyle,opacity:canSave?1:0.45}}>{saving?'Saving…':'Add to closet'}</button>
    </ModalShell>
  );
}

// ── Item Detail ────────────────────────────────────────────────────────────
function ItemDetailModal({ item, category, outfitCount, onClose, onDelete }) {
  return (
    <ModalShell title={item.name} onClose={onClose}>
      <div style={{borderRadius:16,background:'#F5F1E8',padding:18,marginBottom:16,display:'flex',justifyContent:'center',height:240}}><GarmentImage src={item.image} alt={item.name}/></div>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:14,flexWrap:'wrap'}}>
        <span style={{width:8,height:8,borderRadius:'50%',background:category?.swatch||'#888'}}/>
        <span style={{fontSize:13,color:'#C9C5B8'}}>{category?.label||'Uncategorized'}</span>
        <span style={{fontSize:13,color:'#6E6B5E'}}>·</span>
        <span style={{fontSize:13,color:'#6E6B5E'}}>worn in {outfitCount} outfit{outfitCount===1?'':'s'}</span>
      </div>
      {item.notes&&<div style={{fontSize:13.5,color:'#C9C5B8',lineHeight:1.5,marginBottom:18,background:'rgba(245,241,232,0.04)',padding:'10px 13px',borderRadius:10}}>{item.notes}</div>}
      <ConfirmDeleteButton onConfirm={onDelete} label="Remove from closet"/>

}

// ── Picker ─────────────────────────────────────────────────────────────────
function PickerModal({ category, items, currentSelection, onPick, onToggle, onClose }) {
  const isMulti=category.multi;
  const selectedSet=isMulti?new Set(currentSelection||[]):null;
  return (
    <ModalShell title={`Choose ${category.label.toLowerCase()}`} onClose={onClose}>
      {items.length===0?<EmptyState icon={<ImageOff size={30}/>} title="Nothing here yet" subtitle={`Add some ${category.label.toLowerCase()} from the Closet tab first.`}/>:(
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
          {items.map(item=>{
            const sel=isMulti?selectedSet.has(item.id):currentSelection===item.id;
            return (
              <button key={item.id} onClick={()=>isMulti?onToggle(item.id):onPick(item.id)} style={{background:'#F5F1E8',borderRadius:14,padding:10,border:sel?'2.5px solid #C8932C':'2.5px solid transparent',cursor:'pointer',display:'flex',flexDirection:'column',gap:6,position:'relative'}}>
                {sel&&<div style={{position:'absolute',top:6,right:6,width:20,height:20,borderRadius:'50%',background:'#C8932C',display:'flex',alignItems:'center',justifyContent:'center',zIndex:2}}><Check size={12} color="#1B1E2E" strokeWidth={3}/></div>}
                <div style={{height:100,display:'flex',alignItems:'center',justifyContent:'center'}}><GarmentImage src={item.image} alt={item.name}/></div>
                <span style={{fontSize:12,color:'#1B1E2E',fontWeight:500,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.name}</span>
              </button>
            );
          })}
        </div>
      )}
      {isMulti&&items.length>0&&<button onClick={onClose} style={{...primaryBtnStyle,marginTop:18}}>Done</button>}
    </ModalShell>
  );
}

// ── Outfit Builder ─────────────────────────────────────────────────────────
function slotHeight(id){if(id==='shoes')return 108;if(id==='outerwear')return 138;return 152;}

function OutfitBuilderView({ items,categories,selections,onOpenPicker,onRemoveSingle,onRemoveAccessory,onClearAll,onOpenSave,hasAnySelection,onSuggest,suggestLoading,suggestionNote }) {
  if(items.length===0)return <EmptyState icon={<Sparkles size={34}/>} title="Nothing to work with yet" subtitle="Add a few pieces to your closet, then come back to build an outfit."/>;
  return (
    <div style={{padding:'18px 16px 24px'}}>
      <div style={{marginBottom:20}}>
        <button onClick={onSuggest} disabled={suggestLoading} style={{width:'100%',padding:'14px 0',borderRadius:14,border:'1.5px solid rgba(200,147,44,0.45)',background:'rgba(200,147,44,0.12)',color:'#E0AC4A',fontSize:14.5,fontWeight:600,cursor:suggestLoading?'default':'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:8,opacity:suggestLoading?0.7:1}}>
          {suggestLoading?<Loader2 size={17} style={{animation:'spin 1s linear infinite'}}/>:<Sparkles size={17}/>}
          {suggestLoading?'Finding your fit…':'Suggest an outfit'}
        </button>
        {suggestionNote&&!suggestLoading&&<div style={{fontSize:12.5,color:'#9C998C',fontStyle:'italic',marginTop:8,padding:'0 4px',lineHeight:1.4}}>"{suggestionNote}"</div>}
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:16,marginBottom:22}}>
        {categories.map(cat=>{
          if(cat.multi){
            const selIds=selections[cat.id]||[];
            const selItems=selIds.map(id=>items.find(i=>i.id===id)).filter(Boolean);
            return (
              <div key={cat.id}>
                <SlotLabel category={cat}/>
                <div style={{display:'flex',gap:10,overflowX:'auto',paddingBottom:2}}>
                  {selItems.map(item=>(
                    <div key={item.id} style={{position:'relative',width:78,flexShrink:0}}>
                      <div style={{width:78,height:78,borderRadius:12,background:'#F5F1E8',padding:8}}><GarmentImage src={item.image} alt={item.name}/></div>
                      <button onClick={()=>onRemoveAccessory(cat.id,item.id)} style={removeBtnStyle}><X size={11}/></button>
                    </div>
                  ))}
                  <button onClick={()=>onOpenPicker(cat)} style={{...addSlotStyle,width:78,height:78,flexShrink:0}}><Plus size={18}/></button>
                </div>
              </div>
            );
          }
          const h=slotHeight(cat.id);
          const selId=selections[cat.id];
          const selItem=selId?items.find(i=>i.id===selId):null;
          return (
            <div key={cat.id}>
              <SlotLabel category={cat}/>
              {selItem?(
                <div style={{position:'relative'}}>
                  <button onClick={()=>onOpenPicker(cat)} style={{width:'100%',height:h,borderRadius:14,background:'#F5F1E8',padding:14,border:'none',cursor:'pointer'}}><GarmentImage src={selItem.image} alt={selItem.name}/></button>
                  <button onClick={()=>onRemoveSingle(cat.id)} style={removeBtnStyle}><X size={11}/></button>
                </div>
              ):(
                <button onClick={()=>onOpenPicker(cat)} style={{...addSlotStyle,width:'100%',height:h}}><Plus size={18}/><span style={{fontSize:12,marginTop:4}}>Add {cat.label.toLowerCase()}</span></button>
              )}
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={onClearAll} disabled={!hasAnySelection} style={{...secondaryBtnStyle,flex:1,opacity:hasAnySelection?1:0.4}}>Clear</button>
        <button onClick={onOpenSave} disabled={!hasAnySelection} style={{...primaryBtnStyle,flex:2,opacity:hasAnySelection?1:0.4}}>Save outfit</button>
      </div>
    </div>
  );
}

// ── Save Outfit ────────────────────────────────────────────────────────────
function SaveOutfitModal({ onClose, onSave, defaultName, editing }) {
  const [name,setName]=useState(defaultName||'');
  const [saving,setSaving]=useState(false);
  function handleSave(){if(!name.trim()||saving)return;setSaving(true);onSave(name.trim());}
  return (
    <ModalShell title={editing?'Update outfit':'Save this outfit'} onClose={onClose}>
      <div style={{marginBottom:18}}><FieldLabel>Name</FieldLabel><input autoFocus value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Friday class fit" style={inputStyle} onKeyDown={e=>e.key==='Enter'&&handleSave()}/></div>
      <button onClick={handleSave} disabled={!name.trim()||saving} style={{...primaryBtnStyle,opacity:name.trim()&&!saving?1:0.45}}>{saving?'Saving…':editing?'Update outfit':'Save outfit'}</button>
    </ModalShell>
  );
}

// ── Saved Outfits ──────────────────────────────────────────────────────────

  if(outfits.length===0)return <EmptyState icon={<LayoutGrid size={32}/>} title="No saved outfits" subtitle="Put a few pieces together in the Outfit tab, then save your favorites here."/>;
  return (
    <div style={{padding:'18px 16px 24px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}}>
      {outfits.slice().reverse().map(outfit=>{
        const allIds=getOutfitItemIds(outfit.selections);
        const thumbs=allIds.map(id=>items.find(i=>i.id===id)).filter(Boolean).slice(0,4);
        return (
          <button key={outfit.id} onClick={()=>onOpen(outfit)} style={{background:'#22253A',borderRadius:16,padding:12,border:'1px solid rgba(245,241,232,0.06)',cursor:'pointer',textAlign:'left',display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,height:110}}>
              {thumbs.length>0?thumbs.map(item=>(
                <div key={item.id} style={{background:'#F5F1E8',borderRadius:8,padding:6,gridColumn:thumbs.length===1?'1 / -1':'auto'}}><GarmentImage src={item.image} alt={item.name}/></div>
              )):<div style={{gridColumn:'1 / -1',display:'flex',alignItems:'center',justifyContent:'center',color:'#6E6B5E'}}><ImageOff size={20}/></div>}
            </div>
            <div style={{fontSize:13.5,fontWeight:600,color:'#F5F1E8',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{outfit.name}</div>
            <div style={{fontSize:11.5,color:'#6E6B5E'}}>{allIds.length} piece{allIds.length===1?'':'s'}</div>
          </button>

      })}
    </div>
  );
}

// ── Outfit Detail ──────────────────────────────────────────────────────────
function OutfitDetailModal({ outfit, items, categories, onClose, onDelete, onEdit }) {
  const catMap=useMemo(()=>Object.fromEntries(categories.map(c=>[c.id,c])),[categories]);
  const entries=Object.entries(outfit.selections||{}).filter(([,v])=>Array.isArray(v)?v.length>0:!!v);
  return (
    <ModalShell title={outfit.name} onClose={onClose}>
      <div style={{display:'flex',flexDirection:'column',gap:14,marginBottom:18}}>
        {entries.map(([catId,val])=>{
          const cat=catMap[catId]||{label:'Other',swatch:'#888'};
          const ids=Array.isArray(val)?val:[val];
          const its=ids.map(id=>items.find(i=>i.id===id)).filter(Boolean);
          if(!its.length)return null;
          return (
            <div key={catId}>
              <SlotLabel category={cat}/>
              <div style={{display:'flex',gap:10,overflowX:'auto'}}>
                {its.map(item=><div key={item.id} style={{width:90,height:90,borderRadius:12,background:'#F5F1E8',padding:8,flexShrink:0}}><GarmentImage src={item.image} alt={item.name}/></div>)}
              </div>
            </div>
          );
        })}
      </div>
      <div style={{display:'flex',gap:10}}>
        <button onClick={onEdit} style={{...secondaryBtnStyle,flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}><Pencil size={14}/> Edit</button>
        <div style={{flex:1}}><ConfirmDeleteButton onConfirm={onDelete} label="Delete"/></div>
      </div>
    </ModalShell>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App() {
  const [session, setSession] = useState(undefined); // undefined = loading
  const [items, setItems] = useState([]);
  const [customCategories, setCustomCategories] = useState([]);
  const [outfits, setOutfits] = useState([]);
  const [dataLoading, setDataLoading] = useState(false);
  const [activeTab, setActiveTab] = useState('closet');
  const [addItemOpen, setAddItemOpen] = useState(false);
  const [detailItem, setDetailItem] = useState(null);
  const [pickerCat, setPickerCat] = useState(null);
  const [selections, setSelections] = useState({});
  const [saveOutfitOpen, setSaveOutfitOpen] = useState(false);
  const [detailOutfit, setDetailOutfit] = useState(null);
  const [editingOutfitId, setEditingOutfitId] = useState(null);
  const [toast, setToast] = useState(null);
  const [suggestLoading, setSuggestLoading] = useState(false);
  const [suggestionNote, setSuggestionNote] = useState('');
  const [showApiKeyModal, setShowApiKeyModal] = useState(false);
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('rail:apiKey') || '');
  const toastRef = useRef(null);

  const allCategories = useMemo(() => [...BUILTIN_CATEGORIES, ...customCategories], [customCategories]);
  const userId = session?.user?.id;

  // Listen for auth state (handles magic link redirect automatically)
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: { subscription } } = sb.auth.onAuthStateChange((_e, s) => setSession(s ?? null));
    return () => subscription.unsubscribe();
  }, []);

  // Load data when logged in
  useEffect(() => {
    if (!userId) return;
    setDataLoading(true);
    dbLoadAll(userId).then(({ items, outfits, customCategories }) => {
      setItems(items); setOutfits(outfits); setCustomCategories(customCategories);
    }).catch(() => showToast('Could not load your closet.')).finally(() => setDataLoading(false));
  }, [userId]);

  function showToast(msg) {
    setToast(msg);
    if (toastRef.current) clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 2200);
  }

  async function handleSignOut() {
    await sb.auth.signOut();
    setItems([]); setOutfits([]); setCustomCategories([]); setSelections({});
  }

  async function handleAddItem({ name, categoryId, notes, image }) {
    const id = genId();
    const newItem = { id, name, categoryId, notes, image, dateAdded: new Date().toISOString() };
    setItems(p => [...p, newItem]); setAddItemOpen(false); showToast('Added to your closet');
    try { await dbUpsertItem(userId, newItem); } catch { showToast("Couldn't sync."); }
  }

  async function handleAddCategory(label) {
    const id = 'c-' + genId();
    const swatch = CUSTOM_PALETTE[customCategories.length % CUSTOM_PALETTE.length];
    const newCat = { id, label, swatch, multi: false };
    const next = [...customCategories, newCat];
    setCustomCategories(next);
    try { await dbSaveCategories(userId, next); } catch {}
    return newCat;
  }

  async function handleDeleteItem(id) {
    setItems(p => p.filter(i => i.id !== id)); setDetailItem(null); showToast('Removed from your closet');
    try { await dbDeleteItem(userId, id); } catch {}
  }

  async function handleSuggestOutfit() {
    if (!items.length || suggestLoading) return;
    if (!apiKey) { setShowApiKeyModal(true); return; }
    setSuggestLoading(true);
    try {
      const singleCats = allCategories.filter(c=>!c.multi).map(c=>c.id);
      const multiCats  = allCategories.filter(c=>c.multi).map(c=>c.id);
      const manifest   = allCategories.map(cat=>{
        const ci=items.filter(i=>i.categoryId===cat.id); if(!ci.length)return null;
        return `${cat.label} [category id: ${cat.id}]:\n`+ci.map(i=>`  - ${i.id} :: ${i.name}${i.notes?' ('+i.notes+')':''}`).join('\n');
      }).filter(Boolean).join('\n\n');
      const prompt = `You are a men's fashion stylist. Assemble ONE outfit using ONLY items listed below.\n\nWARDROBE:\n${manifest}\n\nSingle-select: ${singleCats.join(', ')||'none'}\nMulti-select: ${multiCats.join(', ')||'none'}\n\nRespond ONLY with JSON:\n{"selections":{"<categoryId>":"<itemId or null or array>"},"reason":"<one sentence under 18 words>"}`;
      const res = await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const text = (data.content||[]).map(b=>b.type==='text'?b.text:'').join('\n').replace(/```json|```/g,'').trim();
      const parsed = JSON.parse(text.slice(text.indexOf('{'), text.lastIndexOf('}')+1));
      const validated = {};
      allCategories.forEach(cat=>{
        const val=parsed.selections[cat.id];
        if(cat.multi){const arr=Array.isArray(val)?val:[];const ok=arr.filter(id=>items.some(i=>i.id===id&&i.categoryId===cat.id));if(ok.length)validated[cat.id]=ok;}
        else if(val&&items.some(i=>i.id===val&&i.categoryId===cat.id))validated[cat.id]=val;
      });
      if(!Object.keys(validated).length) showToast("Couldn't put together a fit yet.");
      else { setSelections(validated); setEditingOutfitId(null); setSuggestionNote(parsed.reason||''); }
    } catch { showToast("Couldn't reach the stylist — try again."); }
    finally { setSuggestLoading(false); }
  }

  async function handleSaveOutfit(name) {
    const id = editingOutfitId || genId();
    const newOutfit = { id, name, selections, dateCreated: new Date().toISOString() };
    setOutfits(p => editingOutfitId ? p.map(o=>o.id===id?newOutfit:o) : [...p, newOutfit]);
    setSaveOutfitOpen(false); setSelections({}); setEditingOutfitId(null);
    showToast(editingOutfitId ? 'Outfit updated' : 'Outfit saved');
    try { await dbUpsertOutfit(userId, newOutfit); } catch {}
  }

  async function handleDeleteOutfit(id) {
    setOutfits(p => p.filter(o => o.id !== id)); setDetailOutfit(null); showToast('Outfit deleted');
    try { await dbDeleteOutfit(userId, id); } catch {}
  }

  function handleEditOutfit(outfit) { setSelections(outfit.selections||{}); setEditingOutfitId(outfit.id); setDetailOutfit(null); setActiveTab('outfit'); }

  const itemCategoryMap = useMemo(() => Object.fromEntries(allCategories.map(c=>[c.id,c])), [allCategories]);
  const hasAnySelection = useMemo(() => getOutfitItemIds(selections).length > 0, [selections]);
  const editingOutfitName = editingOutfitId ? (outfits.find(o=>o.id===editingOutfitId)||{}).name||'' : '';

  // Loading spinner while checking auth
  if (session === undefined) {
    return <div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100%'}}><Loader2 size={30} color="#C8932C" style={{animation:'spin 1s linear infinite'}}/></div>;
  }

  // Not logged in
  if (!session) {
    return (
      <div style={{position:'fixed',inset:0,background:'#1B1E2E',display:'flex',justifyContent:'center',fontFamily:"'Inter',sans-serif",color:'#F5F1E8'}}>
        <div style={{width:'100%',maxWidth:480}}><LoginScreen/></div>
      </div>
    );
  }

  // Logged in
  return (
    <div style={{position:'fixed',inset:0,background:'#1B1E2E',display:'flex',justifyContent:'center'}}>
      <div style={{width:'100%',maxWidth:480,position:'relative',display:'flex',flexDirection:'column',fontFamily:"'Inter',sans-serif",color:'#F5F1E8'}}>
        <Header activeTab={activeTab} onAdd={()=>setAddItemOpen(true)} email={session.user.email} onSignOut={handleSignOut}/>
        <main style={{flex:1,overflowY:'auto'}}>
          {activeTab==='closet'&&<ClosetView items={items} categories={allCategories} loading={dataLoading} onSelectItem={setDetailItem}/>}
          {activeTab==='outfit'&&!dataLoading&&<OutfitBuilderView items={items} categories={allCategories} selections={selections} onOpenPicker={setPickerCat} onRemoveSingle={catId=>setSelections(p=>{const n={...p};delete n[catId];return n;})} onRemoveAccessory={(catId,itemId)=>setSelections(p=>({...p,[catId]:(p[catId]||[]).filter(x=>x!==itemId)}))} onClearAll={()=>{setSelections({});setEditingOutfitId(null);setSuggestionNote('');}} onOpenSave={()=>setSaveOutfitOpen(true)} hasAnySelection={hasAnySelection} onSuggest={handleSuggestOutfit} suggestLoading={suggestLoading} suggestionNote={suggestionNote}/>}
          {activeTab==='saved'&&!dataLoading&&<SavedOutfitsView items={items} outfits={outfits} onOpen={setDetailOutfit}/>}
        </main>
        <TabBar activeTab={activeTab} setActiveTab={setActiveTab}/>

        {addItemOpen&&<AddItemModal categories={allCategories} onClose={()=>setAddItemOpen(false)} onSave={handleAddItem} onAddCategory={handleAddCategory}/>}
        {detailItem&&<ItemDetailModal item={detailItem} category={itemCategoryMap[detailItem.categoryId]} outfitCount={outfits.filter(o=>getOutfitItemIds(o.selections).includes(detailItem.id)).length} onClose={()=>setDetailItem(null)} onDelete={()=>handleDeleteItem(detailItem.id)}/>}
        {pickerCat&&<PickerModal category={pickerCat} items={items.filter(i=>i.categoryId===pickerCat.id)} currentSelection={selections[pickerCat.id]} onPick={itemId=>{setSelections(p=>({...p,[pickerCat.id]:itemId}));setPickerCat(null);}} onToggle={itemId=>setSelections(p=>{const cur=p[pickerCat.id]||[];return{...p,[pickerCat.id]:cur.includes(itemId)?cur.filter(x=>x!==itemId):[...cur,itemId]};})} onClose={()=>setPickerCat(null)}/>}
        {saveOutfitOpen&&<SaveOutfitModal onClose={()=>setSaveOutfitOpen(false)} onSave={handleSaveOutfit} defaultName={editingOutfitName} editing={!!editingOutfitId}/>}
        {detailOutfit&&<OutfitDetailModal outfit={detailOutfit} items={items} categories={allCategories} onClose={()=>setDetailOutfit(null)} onDelete={()=>handleDeleteOutfit(detailOutfit.id)} onEdit={()=>handleEditOutfit(detailOutfit)}/>}
        {showApiKeyModal&&<ApiKeyModal onClose={()=>setShowApiKeyModal(false)} onSave={key=>{setApiKey(key);localStorage.setItem('rail:apiKey',key);setShowApiKeyModal(false);showToast('API key saved');}}/>}
        {toast&&<Toast message={toast}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
